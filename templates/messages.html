<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messaging App</title>
    <style>
        body {
            background-color: #1c1c1c;
            color: white;
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        form {
            margin-bottom: 20px;
        }
        input, button, textarea {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: none;
            border-radius: 5px;
        }
        input[type="text"], textarea {
            background-color: #333;
            color: white;
        }
        button {
            background-color: #007BFF;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .messages {
            background-color: #292929;
            padding: 10px;
            border-radius: 5px;
        }
        .message {
            border-bottom: 1px solid #444;
            padding: 5px 0;
        }
        .message:last-child {
            border-bottom: none;
        }
        .users {
            background-color: #292929;
            padding: 10px;
            border-radius: 5px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Messaging App</h1>

        <form id="messageForm">
            <h2>Send a Message</h2>
            <textarea id="messageContent" placeholder="Your message" required></textarea>
            <button type="submit">Send</button>
        </form>

        <div class="messages">
            <h2>Messages</h2>
            <div id="messagesList"></div>
        </div>

        <div class="users">
            <h2>Users</h2>
            <div id="usersList"></div>
        </div>
    </div>

    <script>
        document.getElementById('messageForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const content = document.getElementById('messageContent').value;

            const response = await fetch('/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ content }),
            });

            const result = await response.json();
            alert(result);
            loadMessages();
        });

        async function loadMessages() {
            const response = await fetch('/messages');
            const messages = await response.json();

            const messagesList = document.getElementById('messagesList');
            messagesList.innerHTML = '';

            messages.forEach(message => {
                const messageDiv = document.createElement('div');
                messageDiv.classList.add('message');
                messageDiv.textContent = message.Message; // Change this based on your JSON structure
                messagesList.appendChild(messageDiv);
            });
        }

        async function loadUsers() {
            const response = await fetch('/Users');
            const users = await response.json();

            const usersList = document.getElementById('usersList');
            usersList.innerHTML = '';

            users.forEach(user => {
                const userDiv = document.createElement('div');
                userDiv.textContent = user.username; // Change this based on your JSON structure
                usersList.appendChild(userDiv);
            });
        }

        loadMessages();
        loadUsers();
    </script>
</body>
</html>
